name: Daily Market Cap Chart

on:
  schedule:
    # 06:30 UTC = 14:30 Asia/Taipei（台股 13:30 收盤，14:30 抓得到當日收盤資料）
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 字型主要靠 mplfonts (內含 Source Han Sans，pip 裝完就好)；
      # 系統字型作為備援，避免 mplfonts 失敗時完全無字型
      - name: Install CJK fonts (fallback)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk
          rm -rf ~/.cache/matplotlib

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch & generate charts
        run: python scripts/fetch_and_generate.py

      - name: Commit & push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily update $(date -u +%Y-%m-%d)"
            git push
          fi
