name: Daily Market Cap Chart

on:
  schedule:
    # 23:30 UTC = 隔天 07:30 Asia/Taipei；週日~週四 UTC = 週一~週五 Taipei
    - cron: '30 23 * * 0-4'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CJK fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          # 額外下載一份單檔 TTF 確保 matplotlib 可識別
          mkdir -p ~/.fonts
          curl -sL -o ~/.fonts/NotoSansTC-Regular.otf \
            https://github.com/googlefonts/noto-cjk/raw/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf
          fc-cache -f
          # 清掉 matplotlib 舊 font cache，下次 import 會重建
          rm -rf ~/.cache/matplotlib

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch & generate charts
        run: python scripts/fetch_and_generate.py

      - name: Commit & push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily update $(date -u +%Y-%m-%d)"
            git push
          fi
