name: Daily Market Cap Chart

on:
  # GitHub Actions schedule 不可靠（連續 3 天 skip），改由 n8n Schedule Trigger
  # 主動打 workflow_dispatch API 觸發。此處只保留 dispatch 端點。
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # kaleido 內含 chromium-headless，渲染 PNG 時直接讀系統字型
      - name: Install CJK fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch & generate charts
        run: python scripts/fetch_and_generate.py

      - name: Commit & push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily update $(date -u +%Y-%m-%d)"
            git push
          fi

      # 等 GitHub Pages 部署 (~30-90s)，再打 n8n webhook 觸發寄信
      # 失敗不擋 workflow，data 已經 commit
      - name: Wait for Pages deploy
        run: sleep 90

      - name: Notify n8n webhook
        if: success()
        run: |
          curl -X POST -fsS --max-time 30 \
            -H "Content-Type: application/json" \
            -d "{\"date\":\"$(date -u +%Y-%m-%d)\",\"run_id\":\"${{ github.run_id }}\"}" \
            "https://hzshannn.zeabur.app/webhook/mcap-daily-trigger-7k3p" \
            || echo "Webhook notify failed (non-fatal, data already pushed)"
